<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up • Study Pulse</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&family=Inter:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-box">
            <a href="index.html" style="color:var(--primary); text-decoration:none; margin-bottom:20px; display:inline-flex; align-items:center; gap:6px;">
                ← Back to Home
            </a>
            <h2 style="text-align:center; margin-bottom:30px;">Create Account</h2>
            
            <form id="signupForm">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn-auth">Create Account</button>
            </form>

            <p style="text-align:center; margin-top:25px;">
                Already have an account? <a href="login.html" style="color:var(--primary); font-weight:600;">Login</a>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
